name: release

# Publishes to npm when a v* tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
#
# Auth: npm "trusted publishing" (OIDC) — configure once on npmjs.com:
#   package settings → Trusted Publishers → GitHub Actions →
#   repo YuanpingSong/ultracodex, workflow release.yml.
# No token secret needed; `--provenance` attaches a verifiable build attestation.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      # idempotent: skip when this version is already on the registry
      # (e.g. the tag commemorates a manual first publish)
      - run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "ultracodex@$VERSION" version > /dev/null 2>&1; then
            echo "ultracodex@$VERSION already published — skipping"
          else
            npm publish --provenance --access public
          fi
