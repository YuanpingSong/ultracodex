name: release

# Publishes to npm when a v* tag is pushed (e.g. `git tag v0.1.0 && git push --tags`).
#
# Auth: npm "trusted publishing" (OIDC) — configure once on npmjs.com:
#   package settings → Trusted Publishers → GitHub Actions →
#   repo YuanpingSong/ultracodex, workflow release.yml.
# No token secret needed; `--provenance` attaches a verifiable build attestation.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC for npm trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4 # version comes from package.json "packageManager"
      # NOTE: no registry-url here — setup-node's registry-url writes an .npmrc
      # with a token placeholder, and a configured-but-empty token makes npm
      # SKIP the trusted-publishing OIDC exchange (unauthenticated PUT → 404).
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Trusted publishing (tokenless OIDC) requires npm >= 11.5; Node 22's
      # bundled npm 10.x signs provenance but then publishes UNAUTHENTICATED,
      # which the registry rejects as a masked 404. Learned the hard way.
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      # idempotent: skip when this version is already on the registry
      # (e.g. the tag commemorates a manual first publish)
      - run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "ultracodex@$VERSION" version > /dev/null 2>&1; then
            echo "ultracodex@$VERSION already published — skipping"
          else
            npm publish --provenance --access public
          fi
